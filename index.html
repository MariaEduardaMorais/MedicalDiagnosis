<!-- index.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Diagnóstico Médico</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Sistema de Diagnóstico Médico</h1>

        <!-- Tabela Editável -->
        <h2>Editar Tabela de Sintomas</h2>
        <table id="symptomTable" border="1">
            <thead>
                <tr>
                    <th>Sintoma</th>
                    <th>Pipin</th>
                    <th>Kafka</th>
                    <th>Persico</th>
                    <th>Loymo</th>
                </tr>
            </thead>
            <tbody>
                <!-- As linhas serão inseridas dinamicamente pelo JS -->
            </tbody>
        </table>
        <button onclick="saveTable()">Salvar Alterações</button>

        <!-- Diagnóstico -->
        <h2>Diagnóstico</h2>
        <div id="diagnosisArea">
            <button onclick="startDiagnosis()">Iniciar Diagnóstico</button>
            <div id="question"></div>
            <div id="options"></div>
            <div id="result"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
